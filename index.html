<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Pybricks Bluetooth Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1e1e1e; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #4caf50; border: none; border-radius: 5px; color: white; }
        .data-box { margin-top: 30px; font-size: 24px; font-family: monospace; }
        .status { color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>LEGO Hub Bluetooth Controller</h1>
    <div id="status" class="status">Status: Nicht verbunden</div>
    <button id="connectBtn">Hub via Bluetooth verbinden</button>

    <div class="data-box">
        <p>Neigung (Roll): <span id="rollVal">0</span>°</p>
        <p>Kraft (Force): <span id="forceVal">0</span> N</p>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const rollVal = document.getElementById('rollVal');
        const forceVal = document.getElementById('forceVal');

        // Die offiziellen UUIDs für den Nordic UART Service, den Pybricks nutzt
        const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const NUS_TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let inputBuffer = "";
        const decoder = new TextDecoder();

        connectBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Suche nach Hub...";
            
            try {
                // 1. Nach Bluetooth-Geräten filtern, die den Pybricks/Nordic-Dienst haben
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [NUS_SERVICE_UUID] }]
                });

                statusDiv.innerText = "Verbinde mit GATT-Server...";
                const server = await device.gatt.connect();

                statusDiv.innerText = "Suche Daten-Service...";
                const service = await server.getPrimaryService(NUS_SERVICE_UUID);

                statusDiv.innerText = "Verbinde mit Datenstrom...";
                const characteristic = await service.getCharacteristic(NUS_TX_CHARACTERISTIC_UUID);

                // 2. Benachrichtigungen aktivieren (der Hub "pusht" die Daten nun zum Browser)
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleBluetoothData);

                statusDiv.innerText = "Status: Kabellos verbunden! 📶";
                statusDiv.style.color = "#4caf50";
                connectBtn.style.display = "none";

            } catch (error) {
                statusDiv.innerText = "Bluetooth-Fehler: " + error;
                statusDiv.style.color = "#f44336";
            }
        });

        // 3. Verarbeitung der ankommenden Bluetooth-Datenpakete
        function handleBluetoothData(event) {
            const value = event.target.value;
            // Konvertiert die Byte-Daten in lesbaren Text
            const textChunk = decoder.decode(value);
            
            inputBuffer += textChunk;
            let lines = inputBuffer.split("\n");
            inputBuffer = lines.pop(); // Unvollständige Zeile für das nächste Paket aufheben

            for (let line of lines) {
                line = line.trim();
                if (line.length > 0) {
                    const dataFields = line.split(",");
                    if (dataFields.length === 2) {
                        const roll = parseFloat(dataFields[0]);
                        const force = parseFloat(dataFields[1]);

                        if (!isNaN(roll) && !isNaN(force)) {
                            rollVal.innerText = roll;
                            forceVal.innerText = force.toFixed(1);
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
